services:
  - type: web
    name: project-management-api
    env: node
    plan: free
    repo: https://github.com/your-username/your-repo # Replace with actual repo
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # Set in Render dashboard
      - key: JWT_SECRET
        sync: false # Set in Render dashboard
      - key: CLOUDINARY_CLOUD_NAME
        sync: false # Set in Render dashboard
      - key: CLOUDINARY_API_KEY
        sync: false # Set in Render dashboard
      - key: CLOUDINARY_API_SECRET
        sync: false # Set in Render dashboard
      - key: CLIENT_URL
        value: https://your-frontend-domain.vercel.app # Replace with actual frontend domain
